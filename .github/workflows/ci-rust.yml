name: CI • Rust

on:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: rust-ci-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: tools

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        checks:
          - advisories
          - bans licenses sources
    # prevent a sudden announcement of a new advisory from failing CI
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          manifest-path: "tools/Cargo.toml"
          command: check ${{ matrix.checks }}
          command-arguments: "--config tools/deny.toml"

      - name: Summary
        run: echo "### ✅ Cargo Deny - ${{ matrix.checks }}" >> $GITHUB_STEP_SUMMARY

  cargo-machete:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: cargo machete
        run: cargo machete

      - name: Summary
        run: echo "### ✅ Cargo Machete - no unused dependencies" >> $GITHUB_STEP_SUMMARY

  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update --component rustfmt

      - name: Format
        run: cargo fmt --all -- --check

      - name: Summary
        run: echo "### ✅ Rustfmt - all files formatted" >> $GITHUB_STEP_SUMMARY

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Tests
        run: cargo test --locked --workspace --all-targets --all-features

      - name: Summary
        run: echo "### ✅ Tests - all workspace tests passed" >> $GITHUB_STEP_SUMMARY

  clippy:
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            arch: "x86_64"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            arch: "x86_64"
            target: "x86_64-pc-windows-msvc"
          - platform: "macos-latest"
            arch: "aarch64"
            target: "aarch64-apple-darwin" # for Arm based macs (M1 and above).

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update --component clippy
          rustup target add ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          shared-key: ${{ matrix.platform }}-${{ matrix.arch }}

      - name: Clippy
        run: cargo clippy --locked --workspace --all-targets --all-features --target ${{ matrix.target }} -- -D warnings

      - name: Summary
        run: echo "### ✅ Clippy - ${{ matrix.platform }} (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
